<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pedro</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <link rel="stylesheet" href="estilos/style.css" media="all">
</head>
<body>
    <main>
        <section>
            <div id="imagem">
            </div>
            <div id="login">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                <form action="login.php" method="post" autocomplete="off">
                    <div class="campo">
                        <span class="material-symbols-outlined">person</span>
                        <input type="email" name="email" id="iemail" placeholder="  seu e-mail" required>
                    </div>
                    <div class="campo">
                        <span class="material-symbols-outlined">vpn_key</span>
                        <input type="password" name="senha" id="isenha" placeholder="  sua senha" required>
                    </div>
                    <div class="buttons">
                        <input type="submit" value="Entrar" id="sub">
                        <a href="#" id="forget">Esqueci a senha<span class="material-symbols-outlined" id="invite">mail</span></a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
